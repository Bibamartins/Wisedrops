[build]
  # db push cria/sincroniza as tabelas e o seed-admin cria o admin (lê ADMIN_PASSWORD do env).
  # Roda na infra do Netlify, onde NETLIFY_DATABASE_URL é injetada pela extensão Neon.
  command = "prisma generate && bash scripts/db-setup.sh && next build"
  publish = ".next"

[build.environment]
  # Node 20 (match local dev version)
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# NextAuth requires this on Netlify — otherwise the session cookie fails
# because Netlify's edge strips/rewrites host headers.
# AUTH_TRUST_HOST is read by NextAuth v5 and must be "true".
